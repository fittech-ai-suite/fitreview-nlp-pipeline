name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fitreview-api:${{ github.sha }} .

      - name: Smoke-test container
        run: |
          docker run -d --name fitreview-test -p 8000:8000 \
            -e SKIP_MODEL_LOAD=true \
            fitreview-api:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8000/health || (docker logs fitreview-test && exit 1)
          docker stop fitreview-test
